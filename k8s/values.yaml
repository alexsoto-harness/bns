name: bns-spring-boot
replicas: 3

image: <+artifact.image>
dockercfg: <+artifact.imagePullSecret>

# Service Type allow you to specify what kind of service you want.
# Possible values for ServiceVariableType are:
# ClusterIP | NodePort | LoadBalancer | ExternalName
serviceType: LoadBalancer

# A Service can map an incoming port to any targetPort.
# targetPort is where application is listening on inside the container.
servicePort: 8080
serviceTargetPort: 8080

env:
  config:
    # Both SHAs use codebase.commitSha (see README); avoid manifest.*.commitId — often unresolved on CD-only runs.
    GITHUB_SHA: "<+codebase.commitSha>"
    BUILD_ID: "<+pipeline.executionId>"
    RUN_NUMBER: "<+pipeline.sequenceId>"
    ENABLE_DARK_MODE: "<+serviceVariables.enableDarkMode>"
    GIT_COMMIT_SHA: "<+codebase.commitSha>"
